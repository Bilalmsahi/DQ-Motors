<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Contact Request</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:'Segoe UI',Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f5;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);">

          <!-- Header -->
          <tr>
            <td style="background-color:#1e293b;padding:28px 40px;text-align:center;">
              <h1 style="margin:0;color:#ffffff;font-size:20px;font-weight:700;">&#128232; New Contact Request</h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:40px;">
              <p style="margin:0 0 24px;color:#475569;font-size:15px;line-height:1.7;">
                A new lead has been submitted through the website. Here are the details:
              </p>

              <!-- Details Table -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;">
                <tr>
                  <td style="padding:12px 16px;background-color:#f8fafc;border-bottom:1px solid #e2e8f0;width:120px;">
                    <strong style="color:#64748b;font-size:13px;text-transform:uppercase;letter-spacing:0.5px;">Name</strong>
                  </td>
                  <td style="padding:12px 16px;border-bottom:1px solid #e2e8f0;color:#1e293b;font-size:15px;font-weight:600;">
                    {{ name }}
                  </td>
                </tr>
                <tr>
                  <td style="padding:12px 16px;background-color:#f8fafc;border-bottom:1px solid #e2e8f0;">
                    <strong style="color:#64748b;font-size:13px;text-transform:uppercase;letter-spacing:0.5px;">Email</strong>
                  </td>
                  <td style="padding:12px 16px;border-bottom:1px solid #e2e8f0;">
                    <a href="mailto:{{ email }}" style="color:#E20505;font-size:15px;text-decoration:none;">{{ email }}</a>
                  </td>
                </tr>
                <tr>
                  <td style="padding:12px 16px;background-color:#f8fafc;border-bottom:1px solid #e2e8f0;">
                    <strong style="color:#64748b;font-size:13px;text-transform:uppercase;letter-spacing:0.5px;">Phone</strong>
                  </td>
                  <td style="padding:12px 16px;border-bottom:1px solid #e2e8f0;color:#1e293b;font-size:15px;">
                    {{ phone|default:"—" }}
                  </td>
                </tr>
                <tr>
                  <td style="padding:12px 16px;background-color:#f8fafc;" valign="top">
                    <strong style="color:#64748b;font-size:13px;text-transform:uppercase;letter-spacing:0.5px;">Message</strong>
                  </td>
                  <td style="padding:12px 16px;color:#1e293b;font-size:15px;line-height:1.6;">
                    {{ message|default:"No message provided." }}
                  </td>
                </tr>
              </table>

              <!-- CTA -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:28px auto 0;">
                <tr>
                  <td style="background-color:#E20505;border-radius:8px;">
                    <a href="{{ site_url }}/admin/leads" target="_blank" style="display:inline-block;padding:12px 32px;color:#ffffff;font-size:14px;font-weight:700;text-decoration:none;">View in Dashboard</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#f8fafc;padding:20px 40px;text-align:center;border-top:1px solid #e2e8f0;">
              <p style="margin:0;color:#94a3b8;font-size:12px;">This is an automated notification from {{ company_name }}.</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
